<svg xmlns="http://www.w3.org/2000/svg" width="620" height="182" viewBox="0 0 620 182" role="img" aria-label="Post-Quantum Cryptography Lab project card">
<style>
.title{font:600 23px Inter,Segoe UI,Arial,sans-serif;fill:#F1F6FF}
.desc{font:400 15px Inter,Segoe UI,Arial,sans-serif;fill:#B5C5DF}
.tag{font:500 12px Inter,Segoe UI,Arial,sans-serif;fill:#8AB8FF}
.status{font:600 12px Inter,Segoe UI,Arial,sans-serif;fill:#52D69A}
.pill{fill:#0B2148;stroke:#1C467F;stroke-width:1}
</style>
<defs>
 <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
  <stop offset="0" stop-color="#071530"/>
  <stop offset="1" stop-color="#030A1D"/>
 </linearGradient>
 <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%"><feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#000814" flood-opacity="0.45"/></filter>
</defs>
<rect x="8" y="8" width="604" height="166" rx="18" fill="url(#bg)" stroke="#1C467F" filter="url(#shadow)"/>
<rect x="8" y="8" width="7" height="166" rx="3.5" fill="#92A4FF"/>
<circle cx="580" cy="36" r="5" fill="#52D69A"/><text x="566" y="63" text-anchor="middle" class="status">IN PROGRESS</text>
<text x="32" y="47" class="title">Post-Quantum Cryptography Lab</text>
<text x="32" y="78" class="desc">Experiments and educational implementations covering ECC</text><text x="32" y="101" class="desc">foundations and the transition to quantum-resistant</text>
<rect x="32" y="132" width="104.4" height="28" rx="14" class="pill"/><text x="84.2" y="151" text-anchor="middle" class="tag">Cryptography</text><rect x="146.4" y="132" width="70" height="28" rx="14" class="pill"/><text x="181.4" y="151" text-anchor="middle" class="tag">PQC</text><rect x="226.4" y="132" width="75.6" height="28" rx="14" class="pill"/><text x="264.2" y="151" text-anchor="middle" class="tag">SageMath</text>
</svg>