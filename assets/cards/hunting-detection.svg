<svg xmlns="http://www.w3.org/2000/svg" width="620" height="182" viewBox="0 0 620 182" role="img" aria-label="Threat Hunting &amp; Detection Labs project card">
<style>
.title{font:600 23px Inter,Segoe UI,Arial,sans-serif;fill:#F1F6FF}
.desc{font:400 15px Inter,Segoe UI,Arial,sans-serif;fill:#B5C5DF}
.tag{font:500 12px Inter,Segoe UI,Arial,sans-serif;fill:#8AB8FF}
.status{font:600 12px Inter,Segoe UI,Arial,sans-serif;fill:#52D69A}
.pill{fill:#0B2148;stroke:#1C467F;stroke-width:1}
</style>
<defs>
 <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
  <stop offset="0" stop-color="#071530"/>
  <stop offset="1" stop-color="#030A1D"/>
 </linearGradient>
 <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%"><feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#000814" flood-opacity="0.45"/></filter>
</defs>
<rect x="8" y="8" width="604" height="166" rx="18" fill="url(#bg)" stroke="#1C467F" filter="url(#shadow)"/>
<rect x="8" y="8" width="7" height="166" rx="3.5" fill="#61C4FF"/>
<circle cx="580" cy="36" r="5" fill="#52D69A"/><text x="566" y="63" text-anchor="middle" class="status">BUILDING</text>
<text x="32" y="47" class="title">Threat Hunting &amp; Detection Labs</text>
<text x="32" y="78" class="desc">Public labs using synthetic telemetry, hypothesis-driven</text><text x="32" y="101" class="desc">hunts, detection logic and MITRE ATT&amp;CK mapping.</text>
<rect x="32" y="132" width="70" height="28" rx="14" class="pill"/><text x="67.0" y="151" text-anchor="middle" class="tag">Hunting</text><rect x="112" y="132" width="82.8" height="28" rx="14" class="pill"/><text x="153.4" y="151" text-anchor="middle" class="tag">Detection</text><rect x="204.8" y="132" width="70" height="28" rx="14" class="pill"/><text x="239.8" y="151" text-anchor="middle" class="tag">SIEM</text>
</svg>